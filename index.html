*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 100%);min-height:100vh;color:#e0e6f0}
.container{max-width:1200px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:2em;color:#fff;letter-spacing:2px;background:linear-gradient(90deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#8899bb;margin-top:8px;font-size:0.95em}

  .btn{padding:14px;font-size:1em}

.form-group{margin-bottom:16px}
.form-group label{display:block;color:#aabbcc;font-size:0.9em;margin-bottom:6px}

.result-card:hover{border-color:rgba(79,172,254,0.5)}
.result-card.best{border-color:rgba(0,200,100,0.4);background:rgba(0,200,100,0.05)}

.result-card .param{text-align:center}

.result-card .param .lbl{font-size:0.75em;color:#667788;margin-top:2px}
.result-card .match-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.78em;font-weight:bold}

.preset-btn:hover{background:rgba(79,172,254,0.2);border-color:#4facfe}

.btn-copy{background:rgba(255,193,7,0.1);border:1px solid rgba(255,193,7,0.3);color:#ffc107}
.btn-copy:hover{box-shadow:0 4px 12px rgba(255,193,7,0.2)}
.btn-quote:hover{box-shadow:0 6px 20px rgba(0,230,118,0.4)}

.export-bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.export-bar .btn{flex:1;min-width:120px;font-size:0.85em;padding:8px}

.info-row{display:flex;justify-content:space-between;font-size:0.8em;color:#667788;margin-top:4px}
.footer{text-align:center;padding:30px 20px;margin-top:30px;border-top:1px solid rgba(255,255,255,0.08);color:#556677;font-size:0.85em;line-height:2}
.footer .company{color:#8899bb;font-weight:bold;font-size:1em}
.footer .contact{color:#4facfe}

<body>
<div class="container">
<div class="header">
<h1>创美水泵智能选型工具</h1>
<p class="sub">输入工况参数，一键匹配最优泵型 | 含管损计算</p>
<div class="brand-tag">浙江创美机电有限公司 · 官方产品数据库</div>
</div>

<div class="main-grid">
<!-- 左栏：参数输入 -->
<div>
<div class="card">
<h2>工况参数</h2>
<div class="preset-bar">
<button class="preset-btn" onclick="fillPreset('basement')" title="地下室/地下车库排水">地下室排水</button>
<button class="preset-btn" onclick="fillPreset('city')" title="城市排水/市政管网排水">城市排水</button>
<button class="preset-btn" onclick="fillPreset('tunnel')" title="隧道排水/地铁排水">隧道排水</button>
<button class="preset-btn" onclick="fillPreset('river')" title="河道/水库调水排涝">河道抽排</button>
<button class="preset-btn" onclick="fillPreset('mine')" title="矿井/基坑排水">矿井排水</button>
<button class="preset-btn" onclick="fillPreset('fire')" title="消防/应急供水">消防供水</button>
</div>
<div class="form-row">
<div class="form-group" style="flex:1">
<label>企业名称</label>
<input type="text" id="companyName" placeholder="请输入公司全称">
</div>
<div class="form-group" style="flex:1">
<label>联系方式</label>
<input type="tel" id="contactPhone" placeholder="手机号/微信号">
</div>
</div>
<div class="form-group"><label>需求流量 Q (m³/h)</label><input type="number" id="q" placeholder="例：500" step="0.1" min="1"></div>
<div class="form-group"><label>几何高差 Z (m) — 泵出口到出水点垂直高度</label><input type="number" id="geoHeight" placeholder="例：28" step="0.1" min="0" value="28" onchange="updateTotalHead()"></div>
<div class="form-row">
<div class="form-group"><label>沿程损失 hf (m)</label><input type="number" id="hfInput" placeholder="管损计算后自动填入" step="0.01" readonly style="color:#ffb74d"></div>
<div class="form-group"><label>局部损失 hl (m)</label><input type="number" id="hlInput" placeholder="管损计算后自动填入" step="0.01" readonly style="color:#ffb74d"></div>
</div>
<div class="form-group"><label>安全余量 (m) — 建议为总扬程的5%~10%</label><input type="number" id="safetyMargin" placeholder="例：3" step="0.1" min="0" value="3" onchange="updateTotalHead()"></div>
<div class="form-group" style="background:rgba(0,230,118,0.08);border-radius:8px;padding:10px">
<label style="color:#00e676;font-weight:bold">总需求扬程 H = Z + hf + hl + 安全余量 (m)</label>
<input type="number" id="h" style="font-size:1.2em;font-weight:bold;color:#00e676;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3)" readonly>
</div>
<div class="form-group"><label>泵类型</label>
<select id="pumpType">
<option value="all">全部类型</option>
<option value="szq_large">大流量防汛泵 (SZQ系列)</option>
<option value="szq_high">高扬程防汛泵 (SZQ系列)</option>
<option value="szq_dual">双用防汛泵</option>
<option value="szq_relay">接力泵</option>
<option value="szq_downsuction">下吸式防汛泵</option>
<option value="yzq">液压轴流泵 (YZQ系列)</option>
</select></div>
<div class="form-group"><label>电压要求</label>
<select id="voltage"><option value="all">不限制</option><option value="220">220V</option><option value="380">380V</option></select></div>
<button class="btn btn-primary" onclick="doSelect()">开始选型</button>
</div>

<div class="card" style="margin-top:16px">
<h2>管损计算（可选）</h2>
<div class="form-row">
<div class="form-group"><label>管径 DN (mm)</label><input type="number" id="pipeDn" placeholder="例：200" min="25" value="200"></div>
<div class="form-group"><label>管长 L (m)</label><input type="number" id="pipeLen" placeholder="例：500" min="1" value="500"></div>
</div>
<div class="form-group"><label>管材</label>
<select id="pipeMaterial" onchange="calcPipeLoss()">
<option value="0.015">新钢管 (ε=0.015mm)</option>
<option value="0.3">旧钢管 (ε=0.3mm)</option>
<option value="0.25">铸铁管 (ε=0.25mm)</option>
<option value="0.0015">塑料管/PVC (ε=0.0015mm)</option>
<option value="0.5">水泥管 (ε=0.5mm)</option>
<option value="0.1" selected>涂塑水带/软管 (ε=0.1mm, 对照)</option>
</select></div>
<div class="form-group"><label>局部阻力系数</label>
<select id="localK">
<option value="0">无局部阻力</option>
<option value="0.5">简单管路 (K=0.5)</option>
<option value="1.5">含弯头阀门 (K=1.5)</option>
<option value="3">复杂管路 (K=3.0)</option>
<option value="5">多弯头多阀 (K=5.0)</option>
</select></div>
<button class="btn btn-secondary" onclick="calcPipeLoss()">计算管损</button>
<div id="pipeLossResult" style="margin-top:12px;font-size:0.9em;color:#aabbcc"></div>
</div>
</div>

<!-- 右栏：选型结果 -->
<div>
<div class="card">
<h2>选型结果</h2>
<div id="resultArea"><div class="empty-state"><div class="icon">🔍</div><p>输入需求流量和扬程<br>点击「开始选型」匹配创美水泵</p></div></div>
</div>
<div class="card" style="margin-top:16px">
<h2>选型分析</h2>
<div id="analysisArea"><div class="empty-state"><p>选型后自动生成分析建议</p></div></div>
</div>
</div>
</div>

</div>

// ====== 达西-魏斯巴赫管损计算 ======
function darcyWeisbach(Q, D, L, roughness, localK) {
  // Q: m³/h, D: mm, L: m, roughness: mm, localK: 局部阻力系数
  const A = Math.PI * Math.pow(D/1000, 2) / 4;  // 截面积 m²
  const v = (Q/3600) / A;  // 流速 m/s
  const g = 9.81;
  const nu = 1.004e-6;  // 运动粘度 m²/s (20°C)
  const Re = v * (D/1000) / nu;
  if (Re < 2300 || Re <= 0) {
    const f = Re > 0 ? 64/Re : 0.02;
    const hf = f * L/(D/1000) * v*v/(2*g);
    const hl = localK * v*v/(2*g);
    return {v, Re, f, hf, hl, total: hf+hl, regime: '层流'};
  }
  // Colebrook 迭代
  const eps = roughness/1000;  // 转换为 m
  let f = 0.02;
  for(let i=0; i<20; i++) {
    const lhs = 1/Math.sqrt(f);
    const rhs = -2*Math.log10(eps/(3.7*(D/1000)) + 2.51/(Re*Math.sqrt(f)));
    const fNew = 1/(rhs*rhs);
    if(Math.abs(fNew-f) < 1e-8) break;
    f = fNew;
  }
  const hf = f * L/(D/1000) * v*v/(2*g);
  const hl = localK * v*v/(2*g);
  return {v, Re, f, hf, hl, total: hf+hl, regime: Re<4000 ? '过渡区' : '湍流'};
}

function calcPipeLoss() {
  const Q = parseFloat(document.getElementById('q').value);
  const D = parseFloat(document.getElementById('pipeDn').value);
  const L = parseFloat(document.getElementById('pipeLen').value);
  const roughness = parseFloat(document.getElementById('pipeMaterial').value);
  const localK = parseFloat(document.getElementById('localK').value);
  const el = document.getElementById('pipeLossResult');

  if (!Q || !D || !L || Q<=0 || D<=0 || L<=0) {
    el.innerHTML = '<span style="color:#ff5252">请先填写需求流量、管径和管长</span>';
    return;
  }

  const r = darcyWeisbach(Q, D, L, roughness, localK);

  // 自动填入沿程损失和局部损失
  document.getElementById('hfInput').value = r.hf.toFixed(2);
  document.getElementById('hlInput').value = r.hl.toFixed(2);

  // 汇总总需求扬程
  updateTotalHead();

  el.innerHTML = `
    <div style="background:rgba(79,172,254,0.08);border-radius:8px;padding:12px">
      <div class="calc-row"><span>流速 v</span><span>${r.v.toFixed(2)} m/s</span></div>
      <div class="calc-row"><span>雷诺数 Re</span><span>${r.Re.toFixed(0)} (${r.regime})</span></div>
      <div class="calc-row"><span>沿程摩擦系数 λ</span><span>${r.f.toFixed(5)}</span></div>
      <div class="calc-row"><span>沿程损失 hf</span><span style="color:#ffb74d">${r.hf.toFixed(2)} m</span></div>
      <div class="calc-row"><span>局部损失 hl</span><span style="color:#ffb74d">${r.hl.toFixed(2)} m</span></div>
      <div class="calc-row" style="font-size:1em;margin-top:4px"><span style="color:#4facfe">管损合计 hf+hl</span><span style="color:#ffb74d;font-size:1.1em">${r.total.toFixed(2)} m</span></div>
      <div class="calc-row" style="font-size:1em;margin-top:4px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px"><span style="color:#00e676">总需求扬程</span><span style="color:#00e676;font-size:1.1em">${document.getElementById('h').value} m</span></div>
    </div>
  `;
}

// ====== 总需求扬程自动汇总 ======
function updateTotalHead() {
  const Z = parseFloat(document.getElementById('geoHeight').value) || 0;
  const hf = parseFloat(document.getElementById('hfInput').value) || 0;
  const hl = parseFloat(document.getElementById('hlInput').value) || 0;
  const safety = parseFloat(document.getElementById('safetyMargin').value) || 0;
  const total = Z + hf + hl + safety;
  document.getElementById('h').value = total.toFixed(2);
}

// ====== 选型逻辑 ======
function doSelect() {
  const Q = parseFloat(document.getElementById('q').value);
  let H = parseFloat(document.getElementById('h').value);
  const pumpType = document.getElementById('pumpType').value;
  const voltage = document.getElementById('voltage').value;
  const company = document.getElementById('companyName').value.trim();
  const phone = document.getElementById('contactPhone').value.trim();
  const resultEl = document.getElementById('resultArea');
  const analysisEl = document.getElementById('analysisArea');
  const selectBtn = document.querySelector('.btn-primary');

  // 按钮loading状态
  if (selectBtn) {
    selectBtn.textContent = '匹配中...';
    selectBtn.disabled = true;
    setTimeout(() => {
      if (selectBtn) { selectBtn.textContent = '开始选型'; selectBtn.disabled = false; }
    }, 3000);
  }

  // 自动计算管损（如果管径管长已填写且管损为空）
  const pipeDn = parseFloat(document.getElementById('pipeDn').value);
  const pipeLen = parseFloat(document.getElementById('pipeLen').value);
  if (Q > 0 && pipeDn > 0 && pipeLen > 0 && !document.getElementById('hfInput').value) {
    calcPipeLoss();
  }
  // 重新读取更新后的H
  H = parseFloat(document.getElementById('h').value);

  if (!Q || !H || Q<=0 || H<=0) {
    resultEl.innerHTML = '<div class="empty-state"><p style="color:#ff5252">请输入有效的流量和扬程</p></div>';
    return;
  }

  // 筛选
  let candidates = pumps.filter(p => {
    if(pumpType !== 'all' && p.type !== pumpType) return false;
    if(voltage !== 'all' && p.voltage != voltage) return false;
    // 流量和扬程都要满足（额定 ≥ 需求）
    return p.flow >= Q * 0.85 && p.head >= H * 0.85;
  });

  // 按匹配度排序：流量偏差 + 扬程偏差，优先匹配度和余量均衡
  candidates.sort((a,b) => {
    // 扬程不足比流量不足更致命，扬程偏差权重1.5
    const scoreA = Math.abs(a.flow - Q)/Math.max(Q,1) + 1.5*Math.abs(a.head - H)/Math.max(H,1);
    const scoreB = Math.abs(b.flow - Q)/Math.max(Q,1) + 1.5*Math.abs(b.head - H)/Math.max(H,1);
    return scoreA - scoreB;
  });

  if(candidates.length === 0) {
    resultEl.innerHTML = `<div class="empty-state"><p style="color:#ffb74d">未找到完全匹配的泵型</p><p style="font-size:0.85em;color:#667788">尝试放宽条件或选择「全部类型」</p></div>`;
    // 降级：显示最接近的
    let fallback = pumps.filter(p => {
      if(pumpType !== 'all' && p.type !== pumpType) return false;
      if(voltage !== 'all' && p.voltage != voltage) return false;
      // 降级推荐也要有合理性：流量不超过2倍，扬程不低于50%
      return p.flow <= Q * 2 && p.head >= H * 0.5;
    });
    fallback.sort((a,b) => {
      const sA = Math.abs(a.flow-Q)/Math.max(Q,1) + Math.abs(a.head-H)/Math.max(H,1);
      const sB = Math.abs(b.flow-Q)/Math.max(Q,1) + Math.abs(b.head-H)/Math.max(H,1);
      return sA - sB;
    });
    if(fallback.length>0) {
      const fb = fallback.slice(0,3);
      analysisEl.innerHTML = `<div class="warning-box"><strong>最接近的型号（仅供参考）</strong><br>`+
        fb.map(p=>`${p.model}：额定Q=${p.flow}m³/h H=${p.head}m（${p.flow<Q?'流量不足':'扬程不足'}）`).join('<br>')+
        `</div>`;
    }
    return;
  }

  // 展示前5个
  const top = candidates.slice(0, 6);
  const best = top[0];
  const exact = top.filter(p => p.flow >= Q && p.head >= H);
  const close = top.filter(p => (p.flow >= Q*0.9 && p.head >= H*0.9) && !exact.includes(p));

  let html = '';
  top.forEach((p, i) => {
    const flowOk = p.flow >= Q;
    const headOk = p.head >= H;
    let badge = '', badgeCls = '';
    if(flowOk && headOk) { badge = '完全满足'; badgeCls = 'match-exact'; }
    else if(flowOk || headOk) { badge = '基本满足'; badgeCls = 'match-close'; }
    else { badge = '余量不足'; badgeCls = 'match-fallback'; }

    html += `<div class="result-card${i===0 && flowOk && headOk ? ' best' : ''}">
      <h3>${i===0 ? '★ ' : ''}${p.model} <span class="match-badge ${badgeCls}">${badge}</span></h3>
      <div class="params">
        <div class="param"><div class="val">${p.flow}</div><div class="lbl">流量 m³/h</div></div>
        <div class="param"><div class="val">${p.head}</div><div class="lbl">扬程 m</div></div>
        <div class="param"><div class="val">${p.power}</div><div class="lbl">功率 kW</div></div>
        <div class="param"><div class="val">${p.voltage}V</div><div class="lbl">电压</div></div>
        <div class="param"><div class="val">DN${p.dia}</div><div class="lbl">口径</div></div>
        <div class="param"><div class="val">${p.speed != null ? p.speed : '-'}</div><div class="lbl">转速 rpm</div></div>
      </div>
      <div class="info-row">
        <span>系列：${p.series}</span><span>类型：${p.cat}</span>
      </div>
    </div>`;
  });

  if(candidates.length > 6) {
    html += `<div style="text-align:center;color:#667788;font-size:0.85em;margin-top:8px">共 ${candidates.length} 个匹配型号，显示前 6 个</div>`;
  }

  resultEl.innerHTML = html + '<div class="action-bar"><button class="btn btn-quote" onclick="getQuote()">获取详细报价与方案</button><button class="btn btn-save" onclick="saveResult()">保存选型结果</button><button class="btn btn-copy" onclick="copyWechatText()">复制微信文案</button></div>';

  // 选型分析
  let analysis = '';
  if(best.flow >= Q && best.head >= H) {
    const marginQ = ((best.flow - Q)/Q*100).toFixed(0);
    const marginH = ((best.head - H)/H*100).toFixed(0);
    analysis += `<div style="color:#00e676;font-weight:bold;margin-bottom:8px">★ 推荐型号：${best.model}</div>`;
    analysis += `<div style="color:#aabbcc;font-size:0.9em">流量余量 ${marginQ}%，扬程余量 ${marginH}%。`;
    if(parseInt(marginQ)>50) analysis += ` 流量余量偏大，可考虑降档选型。`;
    if(parseInt(marginH)>50) analysis += ` 扬程余量偏大，可选用更低扬程泵型节省能耗。`;
    analysis += `</div>`;
  } else {
    analysis += `<div style="color:#ffb74d;font-weight:bold;margin-bottom:8px">最接近型号：${best.model}</div>`;
    analysis += `<div style="color:#ffb74d;font-size:0.9em">该型号不能完全满足需求。`;
    if(best.flow < Q) analysis += ` 流量差 ${(Q-best.flow).toFixed(1)} m³/h，请考虑多台并联或选更大口径。`;
    if(best.head < H) analysis += ` 扬程差 ${(H-best.head).toFixed(1)} m，请考虑更高扬程泵型。`;
    analysis += `</div>`;
  }



  analysisEl.innerHTML = analysis;
}
